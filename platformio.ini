; PlatformIO Project Configuration File
; Mecanum 4WD Robot Controller

[platformio]
default_envs = uno

[env:uno]
platform = atmelavr
board = uno
framework = arduino

; I2C Fast Mode (400kHz) - reduces motor update latency
build_flags =
    -DTWI_FREQ=400000
    -I src/core
    -I src/hal
    -I src/app

; Source filter - main firmware (exclude test/)
build_src_filter = +<*> +<core/*> +<hal/*> +<app/*> -<test/*>

; Library dependencies in lib/ folder
lib_deps =

; Monitor settings
monitor_speed = 115200

; ── Hardware Test Firmware ───────────────────────────────────────────────────
; Build:   pio run -e hwtest
; Upload:  pio run -e hwtest -t upload
; Monitor: pio device monitor -e hwtest
[env:hwtest]
platform = atmelavr
board = uno
framework = arduino
build_flags =
    -DTWI_FREQ=400000
    -I src/core
    -I src/hal
build_src_filter = +<hal/*> +<core/*> +<test/*>
lib_deps =
monitor_speed = 115200
