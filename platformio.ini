; PlatformIO Project Configuration File
; Mecanum 4WD Robot Controller

[env:uno]
platform = atmelavr
board = uno
framework = arduino

; I2C Fast Mode (400kHz) - reduces motor update latency
build_flags =
    -DTWI_FREQ=400000
    -I src/core
    -I src/hal
    -I src/app

; Source filter - build files in src/ and subdirectories
build_src_filter = +<*> +<core/*> +<hal/*> +<app/*>

; Library dependencies in lib/ folder
lib_deps =

; Monitor settings
monitor_speed = 9600
